name: FastAPI CI/CD Demo

on:
  push:
    # Trigger on EVERY branch push so we can test all code
    branches: [ "**" ] 

jobs:
  # -------------------------------------------------------------------------
  # PHASE 1: CONTINUOUS INTEGRATION (CI)
  # RUNS ON: Every single push to any branch.
  # -------------------------------------------------------------------------
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v3
      
      - name: 2. Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: 3. Install Dependencies
        run: pip install -r requirements.txt
        
      - name: 4. Run Automated Tests
        # We test everything to catch bugs early in feature branches.
        run: pytest test_app.py

  # -------------------------------------------------------------------------
  # PHASE 2: CONTINUOUS DELIVERY (CD)
  # RUNS ON: ONLY the 'main' branch, and ONLY if CI passed.
  # -------------------------------------------------------------------------
  continuous-delivery:
    needs: continuous-integration
    # CONDITION: This job only runs if the push was to the 'main' branch.
    if: github.ref == 'refs/heads/main'
    
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v3

      - name: 2. Login to Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: 3. Build and Push Image
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository }}
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          
          docker build -t $IMAGE_ID:latest .
          docker push $IMAGE_ID:latest